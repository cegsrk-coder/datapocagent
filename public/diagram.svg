  <text x="362" y="218" font-size="13" font-weight="600" fill="#1a2332">Express Server</text>
  <text x="462" y="218" font-size="10.5" fill="#5a6b7f">— POST /api/generate</text>
  <text x="362" y="238" font-size="10.5" fill="#5a6b7f">Creates fresh EntityStore per request, orchestrates agent loop</text>
  <rect x="686" y="202" width="100" height="20" rx="4" fill="#e8f2fc"/>
  <text x="736" y="216" text-anchor="middle" font-size="9" font-weight="600" fill="#0076d6">Express 5 / TS</text>

