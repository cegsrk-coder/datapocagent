  <text x="185" y="333" font-size="18">🤖</text>
  <text x="212" y="333" font-size="12" font-weight="600" fill="#1a2332">Agent Loop</text>
  <text x="185" y="352" font-size="10" fill="#5a6b7f">Multi-turn orchestration</text>
  <text x="185" y="366" font-size="10" fill="#5a6b7f">Max 20 turns until completion</text>
