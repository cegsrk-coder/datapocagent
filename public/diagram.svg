<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 840" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#a100ff"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#c4cdd8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="840" rx="16" fill="#f8f9fc"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#a100ff">&gt; accenture</text>
  <text x="550" y="62" text-anchor="middle" font-size="20" font-weight="600" fill="#1a2332">S/4HANA ISU Test Data Agent — Architecture</text>

  <!-- ═══════════ USER LAYER ═══════════ -->
  <rect x="380" y="90" width="340" height="64" rx="12" fill="#fff" stroke="#e2e6ed" filter="url(#shadow)"/>
  <rect x="380" y="90" width="340" height="64" rx="12" fill="#fff" stroke="#a100ff" stroke-width="1.5" stroke-dasharray="0"/>
  <text x="415" y="118" font-size="18">💬</text>
  <text x="442" y="118" font-size="13" font-weight="600" fill="#1a2332">Chat Interface</text>
  <text x="442" y="136" font-size="10.5" fill="#5a6b7f">Natural language scenario input &amp; data viewer</text>
  <rect x="616" y="102" width="90" height="20" rx="4" fill="#f3e8ff"/>
  <text x="661" y="116" text-anchor="middle" font-size="9" font-weight="600" fill="#a100ff">HTML / JS / CSS</text>

  <!-- Arrow: User → Server -->
  <line x1="550" y1="154" x2="550" y2="184" stroke="#a100ff" stroke-width="2" marker-end="url(#arrow)"/>

