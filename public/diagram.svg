  <rect x="300" y="190" width="500" height="64" rx="12" fill="#fff" stroke="#e2e6ed" filter="url(#shadow)"/>
  <rect x="300" y="190" width="500" height="64" rx="12" fill="#fff" stroke="#0076d6" stroke-width="1.5"/>
